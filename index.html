<!DOCTYPE html>
<html lang="ko" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mystery Soup AI</title>
    <!-- Tailwind & Fonts: Removed 'crossorigin' to ensure local file compatibility -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Noto+Serif+KR:wght@700;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Plus Jakarta Sans', 'sans-serif'],
                        serif: ['Noto Serif KR', 'serif'],
                    },
                    colors: {
                        obsidian: '#050505',
                        mystic: '#EAB308',
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #050505; color: #fff; overflow: hidden; margin: 0; }
        
        .bg-mesh {
            background: radial-gradient(circle at 0% 0%, #1e1b4b 0%, transparent 35%),
                        radial-gradient(circle at 100% 100%, #0f172a 0%, transparent 35%);
            position: fixed; inset: 0; z-index: -1;
        }

        .dossier-card {
            background: rgba(15, 15, 18, 0.7);
            backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 40px 100px -20px rgba(0, 0, 0, 0.8);
        }

        .bubble-ai { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.05); }
        .bubble-user { background: linear-gradient(135deg, #EAB308, #CA8A04); color: #000; font-weight: 700; }

        .slide-up { animation: slideUp 0.5s ease-out forwards; }
        @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        #chat-box::-webkit-scrollbar { width: 4px; }
        #chat-box::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }
    </style>
</head>
<body class="font-sans min-h-screen flex items-center justify-center p-4">
    <div class="bg-mesh"></div>

    <!-- AI Loading Screen -->
    <div id="ai-loading" class="fixed inset-0 z-[100] bg-obsidian flex flex-col items-center justify-center p-8 transition-all duration-1000">
        <div class="relative w-32 h-32 mb-12">
            <div class="absolute inset-0 border-4 border-white/5 rounded-full"></div>
            <div class="absolute inset-0 border-t-4 border-mystic rounded-full animate-spin"></div>
        </div>
        <div class="text-center space-y-3">
            <h3 class="text-2xl font-extrabold tracking-tighter text-white uppercase">Initializing Investigation</h3>
            <p id="loading-status" class="text-[10px] font-black uppercase tracking-[0.6em] text-mystic/60">Local Intelligence Node (0%)</p>
        </div>
    </div>

    <!-- Main Content Container -->
    <main class="relative z-10 w-full max-w-5xl h-[90vh] flex flex-col dossier-card rounded-[3rem] overflow-hidden slide-up">
        
        <!-- App Header -->
        <header class="flex-shrink-0 px-10 py-8 flex justify-between items-center border-b border-white/5 bg-white/5">
            <div class="flex items-center gap-4">
                <div class="w-10 h-10 bg-mystic rounded-2xl flex items-center justify-center shadow-lg shadow-mystic/20">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-black" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
                </div>
                <div>
                    <h1 class="text-lg font-black tracking-tighter uppercase">Mystery Soup <span class="text-mystic italic">AI</span></h1>
                    <p class="text-[9px] font-bold text-zinc-500 uppercase tracking-widest leading-none mt-1">Intelligence Division</p>
                </div>
            </div>
            <button onclick="randomCase()" class="px-6 py-3 rounded-2xl bg-white/5 border border-white/10 hover:bg-white/10 hover:border-mystic/30 transition-all flex items-center gap-3 group">
                <span class="text-[10px] font-black uppercase tracking-widest text-zinc-400 group-hover:text-white">Shuffle Database</span>
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-mystic group-hover:rotate-180 transition-transform duration-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3"><path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.001 0 01-15.357-2m15.357 2H15" /></svg>
            </button>
        </header>

        <!-- Game Content -->
        <div class="flex-grow flex flex-col md:flex-row overflow-hidden">
            
            <!-- Left: Problem Description -->
            <aside class="w-full md:w-[42%] p-10 border-r border-white/5 flex flex-col gap-8 bg-black/20 overflow-y-auto">
                <div class="space-y-6">
                    <div class="flex items-center gap-2">
                        <span id="case-id-badge" class="px-3 py-1 bg-mystic/10 text-mystic text-[10px] font-black uppercase tracking-widest rounded-lg border border-mystic/20">Case #01</span>
                        <span class="px-3 py-1 bg-green-500/10 text-green-500 text-[10px] font-black uppercase tracking-widest rounded-lg border border-green-500/20 text-[10px]">Open</span>
                    </div>
                    <h2 id="problem-text" class="text-3xl md:text-4xl font-serif font-black leading-tight text-white italic transition-all duration-500">
                        "한 남자가 음식점에서 바다거북 수프를 주문해 한 입 먹고 자살했다. 왜일까?"
                    </h2>
                    <div class="h-1 w-16 bg-mystic rounded-full opacity-50"></div>
                </div>

                <div class="mt-auto pt-10">
                    <div class="p-6 rounded-[2rem] bg-white/5 border border-white/5 space-y-4">
                        <div class="flex justify-between items-center">
                            <p class="text-[9px] font-black text-zinc-500 uppercase tracking-widest">Investigation Progress</p>
                            <span class="text-xs font-bold text-mystic">15%</span>
                        </div>
                        <div class="h-1.5 w-full bg-zinc-900 rounded-full overflow-hidden">
                            <div class="h-full bg-mystic w-[15%] rounded-full shadow-[0_0_15px_rgba(234,179,8,0.5)]"></div>
                        </div>
                    </div>
                </div>
            </aside>

            <!-- Right: Interrogation Chat -->
            <section class="flex-grow flex flex-col bg-black/40 relative">
                <div id="chat-box" class="flex-grow overflow-y-auto p-10 space-y-8 pb-32">
                    <!-- AI Initial Message -->
                    <div class="flex gap-5 max-w-2xl slide-up">
                        <div class="w-10 h-10 rounded-xl bg-white/5 border border-white/10 flex items-center justify-center flex-shrink-0">
                            <div class="w-1.5 h-1.5 bg-mystic rounded-full animate-pulse shadow-[0_0_10px_#EAB308]"></div>
                        </div>
                        <div class="space-y-2">
                            <p class="text-[10px] font-black text-mystic uppercase tracking-widest">AI Master</p>
                            <div class="bubble-ai p-6 rounded-[2rem] rounded-tl-none text-zinc-300 leading-relaxed text-base font-medium">
                                "조사를 시작합니다, 탐정님. 이 사건의 진실은 오직 당신의 예리한 질문 끝에 있습니다. 저는 <b>예, 아니오, 관련 없음</b>으로만 대답하겠습니다."
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Input Console -->
                <div class="absolute bottom-0 left-0 right-0 p-8 bg-gradient-to-t from-[#0c0c0e] via-[#0c0c0e]/95 to-transparent">
                    <div class="max-w-2xl mx-auto">
                        <div class="relative flex items-center bg-zinc-900/90 border border-white/10 rounded-[2rem] p-2 pr-3 focus-within:border-mystic/50 transition-all shadow-2xl">
                            <input type="text" id="user-input" placeholder="사건의 내막을 질문하세요..." 
                                class="flex-grow bg-transparent border-none outline-none px-6 py-4 text-base font-medium placeholder:text-zinc-600">
                            <button id="send-btn" class="w-12 h-12 bg-mystic rounded-2xl flex items-center justify-center text-black hover:bg-yellow-500 transition-all active:scale-95 shadow-xl shadow-mystic/20">
                                <svg id="send-icon" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor" stroke-width="3"><path d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 001.169 1.409l5-1.429A1 1 0 009 15.571V11a1 1 0 112 0v4.571a1 1 0 00.725.962l5 1.428a1 1 0 001.17-1.408l-7-14z" /></svg>
                                <div id="typing-indicator" class="hidden w-4 h-4 border-2 border-black/20 border-t-black rounded-full animate-spin"></div>
                            </button>
                        </div>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <script type="module">
        import * as webllm from "https://esm.run/@mlc-ai/web-llm";

        const cases = [
            { id: 1, problem: "한 남자가 음식점에서 바다거북 수프를 주문해 한 입 먹고 자살했다. 왜일까?", truth: "남자는 과거 아내와 조난당해 인육을 먹고 살아남았으나, 진짜 수프 맛이 다른 것을 보고 진실을 깨달아 자살함." },
            { id: 2, problem: "사막에 한 남자가 알몸으로 죽어 있다. 손에는 부러진 성냥개비가 들려 있다. 왜일까?", truth: "열기구 무게를 줄이기 위해 옷을 다 벗었으나 부족했고, 성냥개비를 뽑아 떨어진 사람이 이 남자였음." },
            { id: 3, problem: "밤늦게 TV를 보던 여자가 TV를 끄고 잤다. 다음날 뉴스를 보고 절망했다. 왜일까?", truth: "그녀는 등대지기였고, 그녀가 끈 것은 TV가 아니라 등대 불빛이었음. 이로 인해 대형 난파 사고가 발생함." }
        ];

        let currentCase = cases[0];
        let engine;
        let chatHistory = [];

        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const sendIcon = document.getElementById('send-icon');
        const typingIndicator = document.getElementById('typing-indicator');
        const aiLoading = document.getElementById('ai-loading');
        const loadingStatus = document.getElementById('loading-status');

        async function initAI() {
            try {
                engine = await webllm.CreateWebWorkerEngine(
                    new Worker(URL.createObjectURL(new Blob([`importScripts("https://esm.run/@mlc-ai/web-llm/dist/worker.js");`], { type: "text/javascript" }))),
                    "gemma-2b-it-q4f16_1-MLC",
                    {
                        initProgressCallback: (report) => {
                            const p = Math.floor(report.progress * 100);
                            loadingStatus.innerText = `Learning Investigative Logic... ${p}%`;
                            if (report.progress >= 1) {
                                setTimeout(() => {
                                    aiLoading.style.opacity = '0';
                                    setTimeout(() => aiLoading.style.display = 'none', 1000);
                                }, 1000);
                            }
                        }
                    }
                );
                resetGame();
            } catch (err) {
                loadingStatus.innerText = "Compatibility Error: GPU required.";
                console.error(err);
            }
        }

        window.randomCase = function() {
            currentCase = cases.filter(c => c.id !== currentCase.id)[Math.floor(Math.random() * (cases.length - 1))];
            
            const problemEl = document.getElementById('problem-text');
            problemEl.style.opacity = '0';
            problemEl.style.transform = 'translateY(10px)';
            
            setTimeout(() => {
                document.getElementById('case-id-badge').innerText = `Case #${String(currentCase.id).padStart(2, '0')}`;
                problemEl.innerText = currentCase.problem;
                problemEl.style.opacity = '1';
                problemEl.style.transform = 'translateY(0)';
                resetGame();
            }, 400);
        };

        function resetGame() {
            chatBox.innerHTML = `
                <div class="flex gap-5 max-w-2xl slide-up">
                    <div class="w-10 h-10 rounded-xl bg-white/5 border border-white/10 flex items-center justify-center flex-shrink-0">
                        <div class="w-1.5 h-1.5 bg-mystic rounded-full animate-pulse"></div>
                    </div>
                    <div class="space-y-2">
                        <p class="text-[10px] font-black text-mystic uppercase tracking-widest">AI Master</p>
                        <div class="bubble-ai p-6 rounded-[2rem] rounded-tl-none text-zinc-300 leading-relaxed text-base font-medium">
                            "새로운 조사를 시작합니다. 질문을 던져 사건의 진실을 파헤치십시오."
                        </div>
                    </div>
                </div>
            `;
            chatHistory = [{
                role: "system",
                content: `너는 바다거북 스프 게임 마스터야. 상황: ${currentCase.problem} / 진실: ${currentCase.truth}. 규칙: 1. 질문에 오직 '예', '아니오', '관련 없습니다' 중 하나로만 답하라. 2. 핵심 진실에 도달하면 정답임을 알리고 전체 스토리를 설명하라. 3. 한국어로만 답하라.`
            }];
        }

        function appendMessage(role, text) {
            const div = document.createElement('div');
            div.className = `flex gap-5 ${role === 'user' ? 'justify-end' : ''} w-full slide-up`;
            
            const isAI = role === 'ai';
            const html = isAI ? `
                <div class="w-10 h-10 rounded-xl bg-white/5 border border-white/10 flex items-center justify-center flex-shrink-0">
                    <div class="w-1.5 h-1.5 bg-mystic rounded-full shadow-[0_0_10px_#EAB308]"></div>
                </div>
                <div class="space-y-2">
                    <p class="text-[10px] font-black text-mystic uppercase tracking-widest">AI Master</p>
                    <div class="bubble-ai p-6 rounded-[2rem] rounded-tl-none text-zinc-300 leading-relaxed text-base font-medium max-w-xl shadow-2xl">
                        ${text}
                    </div>
                </div>
            ` : `
                <div class="space-y-2 text-right">
                    <p class="text-[10px] font-black text-zinc-600 uppercase tracking-widest">Investigator</p>
                    <div class="bubble-user p-5 rounded-[1.8rem] rounded-tr-none text-black leading-relaxed text-base shadow-xl max-w-md">
                        ${text}
                    </div>
                </div>
            `;
            
            div.innerHTML = html;
            chatBox.appendChild(div);
            chatBox.scrollTo({ top: chatBox.scrollHeight, behavior: 'smooth' });
        }

        async function handleSend() {
            const val = userInput.value.trim();
            if (!val || !engine) return;

            appendMessage('user', val);
            userInput.value = '';
            sendIcon.classList.add('hidden');
            typingIndicator.classList.remove('hidden');
            
            chatHistory.push({ role: "user", content: val });

            try {
                const chunks = await engine.chat.completions.create({ messages: chatHistory, temperature: 0.1 });
                const reply = chunks.choices[0].message.content;
                chatHistory.push({ role: "assistant", content: reply });
                appendMessage('ai', reply);
            } catch (err) {
                appendMessage('ai', "Neural Error: " + err.message);
            } finally {
                sendIcon.classList.remove('hidden');
                typingIndicator.classList.add('hidden');
            }
        }

        sendBtn.addEventListener('click', handleSend);
        userInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleSend(); });

        initAI();
    </script>
</body>
</html>
