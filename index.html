<!DOCTYPE html>
<html lang="ko" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mystery Soup AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Playfair+Display:ital,wght@0,400;0,900;1,400;1,900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Plus Jakarta Sans', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                    },
                    animation: {
                        'slow-fade': 'fadeIn 1.5s ease-out forwards',
                        'float': 'floating 6s ease-in-out infinite',
                        'shimmer': 'shimmer 2s linear infinite',
                    },
                    keyframes: {
                        fadeIn: { '0%': { opacity: '0', transform: 'translateY(20px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } },
                        floating: { '0%, 100%': { transform: 'translateY(0)' }, '50%': { transform: 'translateY(-10px)' } },
                        shimmer: { '0%': { backgroundPosition: '-200% 0' }, '100%': { backgroundPosition: '200% 0' } }
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #030303; color: #fff; overflow: hidden; letter-spacing: -0.02em; }
        
        /* High-end Background */
        .mesh-gradient {
            background: radial-gradient(circle at 50% -20%, #1e1b4b 0%, transparent 50%),
                        radial-gradient(circle at 0% 100%, #0f172a 0%, transparent 40%),
                        radial-gradient(circle at 100% 100%, #1e1b4b 0%, transparent 40%);
        }
        .grain {
            background-image: url("https://www.transparenttextures.com/patterns/stardust.png");
            opacity: 0.05;
        }

        /* Glassmorphism */
        .glass-input {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* Typography */
        .text-gradient {
            background: linear-gradient(to bottom right, #fff 30%, rgba(255,255,255,0.4) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Border Beam Animation */
        .border-beam {
            position: relative;
            overflow: hidden;
        }
        .border-beam::after {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 50%; height: 100%;
            background: linear-gradient(to right, transparent, rgba(234, 179, 8, 0.2), transparent);
            transform: skewX(-25deg);
            animation: shimmer 4s infinite;
        }

        /* Hide Scrollbar */
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="mesh-gradient min-h-screen font-sans flex flex-col items-center justify-center p-6">
    <div class="grain fixed inset-0 pointer-events-none"></div>

    <!-- AI Booting Overlay -->
    <div id="ai-loading" class="fixed inset-0 z-[100] bg-[#030303] flex flex-col items-center justify-center transition-all duration-1000">
        <div class="relative w-24 h-24 mb-12">
            <div class="absolute inset-0 border-[1px] border-white/5 rounded-full"></div>
            <div class="absolute inset-0 border-t-[1px] border-yellow-500 rounded-full animate-spin"></div>
        </div>
        <p id="loading-status" class="text-[10px] font-black uppercase tracking-[0.6em] text-white/40 animate-pulse">Initializing Knowledge Base</p>
    </div>

    <!-- Global Nav -->
    <nav class="fixed top-0 left-0 right-0 p-8 flex justify-between items-center z-50">
        <div class="flex items-center gap-4 group cursor-pointer" onclick="location.reload()">
            <div class="w-8 h-8 rounded-full bg-white/5 border border-white/10 flex items-center justify-center group-hover:bg-white/10 transition-all">
                <div class="w-1.5 h-1.5 bg-yellow-500 rounded-full"></div>
            </div>
            <span class="text-[10px] font-black uppercase tracking-[0.4em] text-white/60 group-hover:text-white transition-colors">Mystery Soup AI</span>
        </div>
        <button onclick="randomCase()" class="px-6 py-2.5 rounded-full glass-card text-[10px] font-black uppercase tracking-[0.2em] text-white/60 hover:text-white hover:bg-white/5 transition-all flex items-center gap-3">
            <span>Next Case</span>
            <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3"><path stroke-linecap="round" stroke-linejoin="round" d="M17 8l4 4m0 0l-4 4m4-4H3" /></svg>
        </button>
    </nav>

    <!-- Main Scene -->
    <main class="relative w-full max-w-5xl flex flex-col items-center">
        
        <!-- Case Hero Section -->
        <div id="hero-section" class="w-full text-center mb-16 px-4 animate-slow-fade">
            <div class="flex flex-col items-center mb-8">
                <span id="case-id" class="text-[10px] font-black text-yellow-500 uppercase tracking-[0.5em] mb-4">Case #01</span>
                <div class="h-px w-8 bg-yellow-500/30"></div>
            </div>
            <h2 id="problem-text" class="text-4xl md:text-6xl font-serif font-black leading-[1.1] text-gradient italic max-w-4xl mx-auto">
                "한 남자가 음식점에서 바다거북 수프를 주문해 한 입 먹고 자살했다. 왜일까?"
            </h2>
        </div>

        <!-- Dynamic Chat Stream -->
        <div id="chat-box" class="w-full max-w-2xl overflow-y-auto max-h-[35vh] space-y-10 mb-24 px-4 py-4 mask-fade">
            <!-- Messages flow here -->
        </div>

        <!-- Floating Input Console -->
        <div class="fixed bottom-12 left-1/2 -translate-x-1/2 w-full max-w-xl px-6 z-50">
            <div class="glass-input rounded-[2.5rem] p-2 flex items-center group border-beam">
                <input type="text" id="user-input" placeholder="사건의 내막을 질문하세요..." 
                    class="flex-grow bg-transparent border-none outline-none px-8 py-5 text-lg font-medium placeholder:text-white/10">
                <button id="send-btn" class="w-14 h-14 bg-white rounded-full flex items-center justify-center text-black hover:scale-105 active:scale-95 transition-all shadow-2xl">
                    <svg id="send-icon" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M14 5l7 7m0 0l-7 7m7-7H3" /></svg>
                    <div id="typing-indicator" class="hidden w-5 h-5 border-2 border-black/20 border-t-black rounded-full animate-spin"></div>
                </button>
            </div>
            
            <!-- Minimal Stats -->
            <div class="mt-6 flex justify-center gap-8 opacity-20 text-[8px] font-black uppercase tracking-[0.4em]">
                <span>AI Master Active</span>
                <span>Local GPU Encryption</span>
                <span>Press Enter to Submit</span>
            </div>
        </div>
    </main>

    <script type="module">
        import * as webllm from "https://esm.run/@mlc-ai/web-llm";

        const cases = [
            { id: 1, problem: "한 남자가 음식점에서 바다거북 수프를 주문해 한 입 먹고 자살했다. 왜일까?", truth: "남자는 과거 아내와 조난당해 인육을 먹고 살아남았으나, 진짜 수프 맛이 다른 것을 보고 진실을 깨달아 자살함." },
            { id: 2, problem: "사막에 한 남자가 알몸으로 죽어 있다. 손에는 부러진 성냥개비가 들려 있다. 왜일까?", truth: "열기구 무게를 줄이기 위해 옷을 다 벗었으나 부족했고, 성냥개비를 뽑아 떨어진 사람이 이 남자였음." },
            { id: 3, problem: "밤늦게 TV를 보던 여자가 TV를 끄고 잤다. 다음날 뉴스를 보고 절망했다. 왜일까?", truth: "그녀는 등대지기였고, 그녀가 끈 것은 TV가 아니라 등대 불빛이었음. 이로 인해 대형 난파 사고가 발생함." }
        ];

        let currentCase = cases[0];
        let engine;
        let chatHistory = [];

        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const sendIcon = document.getElementById('send-icon');
        const typingIndicator = document.getElementById('typing-indicator');
        const aiLoading = document.getElementById('ai-loading');
        const loadingStatus = document.getElementById('loading-status');

        async function initAI() {
            try {
                engine = await webllm.CreateWebWorkerEngine(
                    new Worker(new WorkerURL()),
                    "gemma-2b-it-q4f16_1-MLC",
                    {
                        initProgressCallback: (report) => {
                            loadingStatus.innerText = `Loading Knowledge ${Math.floor(report.progress * 100)}%`;
                            if (report.progress >= 1) {
                                setTimeout(() => aiLoading.style.opacity = '0', 500);
                                setTimeout(() => aiLoading.style.display = 'none', 1500);
                            }
                        }
                    }
                );
                resetGame();
            } catch (err) {
                loadingStatus.innerText = "GPU Compatibility Error";
                console.error(err);
            }
        }

        // Helper for WebWorker URL in ESM
        function WorkerURL() {
            const content = `importScripts("https://esm.run/@mlc-ai/web-llm/dist/worker.js");`;
            return URL.createObjectURL(new Blob([content], { type: "text/javascript" }));
        }

        window.randomCase = function() {
            const next = cases.filter(c => c.id !== currentCase.id)[Math.floor(Math.random() * (cases.length - 1))];
            currentCase = next;
            
            const hero = document.getElementById('hero-section');
            hero.style.opacity = '0';
            hero.style.transform = 'translateY(10px)';
            
            setTimeout(() => {
                document.getElementById('case-id').innerText = `Case #${String(currentCase.id).padStart(2, '0')}`;
                document.getElementById('problem-text').innerText = currentCase.problem;
                hero.style.opacity = '1';
                hero.style.transform = 'translateY(0)';
                resetGame();
            }, 500);
        };

        function resetGame() {
            chatBox.innerHTML = '';
            chatHistory = [{
                role: "system",
                content: `너는 바다거북 스프 게임 마스터야. 상황: ${currentCase.problem} / 진실: ${currentCase.truth}. 규칙: 1. 질문에 오직 '예', '아니오', '관련 없습니다' 중 하나로만 답하라. 2. 핵심 진실에 도달하면 정답임을 알리고 전체 스토리를 설명하라. 3. 한국어로만 답하라.`
            }];
        }

        function appendMessage(role, text) {
            const div = document.createElement('div');
            div.className = `w-full flex ${role === 'user' ? 'justify-end' : 'justify-start'} animate-slow-fade`;
            
            const content = role === 'user' 
                ? `<div class="bg-white text-black px-6 py-3 rounded-full text-sm font-semibold shadow-xl">${text}</div>`
                : `<div class="flex flex-col gap-2">
                    <span class="text-[8px] font-black text-yellow-500 uppercase tracking-widest ml-4">AI Master</span>
                    <div class="text-white/60 text-xl font-serif italic ml-4 leading-relaxed max-w-lg">${text}</div>
                   </div>`;
            
            div.innerHTML = content;
            chatBox.appendChild(div);
            chatBox.scrollTo({ top: chatBox.scrollHeight, behavior: 'smooth' });
        }

        async function handleSend() {
            const val = userInput.value.trim();
            if (!val || !engine) return;

            appendMessage('user', val);
            userInput.value = '';
            sendIcon.classList.add('hidden');
            typingIndicator.classList.remove('hidden');
            
            chatHistory.push({ role: "user", content: val });

            try {
                const chunks = await engine.chat.completions.create({
                    messages: chatHistory,
                    temperature: 0.1
                });
                const reply = chunks.choices[0].message.content;
                chatHistory.push({ role: "assistant", content: reply });
                appendMessage('ai', reply);
            } catch (err) {
                appendMessage('ai', "Neural Link Error: " + err.message);
            } finally {
                sendIcon.classList.remove('hidden');
                typingIndicator.classList.add('hidden');
            }
        }

        sendBtn.addEventListener('click', handleSend);
        userInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleSend(); });

        initAI();
    </script>
</body>
</html>
