<!DOCTYPE html>
<html lang="ko" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mystery Soup AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:ital,wght@0,900;1,900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                    },
                    colors: {
                        zinc: {
                            950: '#09090b',
                            900: '#18181b',
                            800: '#27272a',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { 
            background-color: #09090b; 
            color: #ececec; 
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        
        /* Modern Background Grain */
        .noise {
            position: fixed;
            inset: 0;
            z-index: 9999;
            pointer-events: none;
            opacity: 0.02;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3仿真%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        .floating-input-container {
            background: rgba(24, 24, 27, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
        }

        .case-card {
            background: radial-gradient(circle at top left, rgba(255,255,255,0.03) 0%, transparent 50%);
        }

        .message-fade { animation: messageFade 0.4s ease-out forwards; }
        @keyframes messageFade { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="selection:bg-yellow-500/30 selection:text-yellow-200">
    <div class="noise"></div>

    <!-- AI Booting -->
    <div id="ai-loading" class="fixed inset-0 z-[100] bg-zinc-950 flex flex-col items-center justify-center transition-opacity duration-1000">
        <div class="w-12 h-12 mb-6 flex gap-1 items-end justify-center">
            <div class="w-1.5 h-4 bg-zinc-800 animate-[bounce_1s_infinite_0ms]"></div>
            <div class="w-1.5 h-8 bg-zinc-600 animate-[bounce_1s_infinite_200ms]"></div>
            <div class="w-1.5 h-6 bg-zinc-400 animate-[bounce_1s_infinite_400ms]"></div>
        </div>
        <p id="loading-status" class="text-[10px] font-bold uppercase tracking-[0.5em] text-zinc-500">Neural Link Booting</p>
    </div>

    <!-- Top Navigation -->
    <nav class="fixed top-0 inset-x-0 p-8 flex justify-between items-center z-50 pointer-events-none">
        <div class="flex items-center gap-3 pointer-events-auto group cursor-pointer" onclick="location.reload()">
            <div class="w-2 h-2 rounded-full bg-yellow-500 group-hover:scale-125 transition-transform"></div>
            <span class="text-[11px] font-bold uppercase tracking-[0.3em] text-zinc-500 group-hover:text-zinc-200 transition-colors">Mystery Soup AI</span>
        </div>
        <button onclick="randomCase()" class="pointer-events-auto px-5 py-2 rounded-full bg-zinc-900 border border-zinc-800 text-[10px] font-bold uppercase tracking-widest text-zinc-400 hover:text-white hover:border-zinc-700 transition-all">
            Shuffle Case
        </button>
    </nav>

    <!-- Content Center -->
    <main class="relative h-screen flex flex-col items-center pt-32 pb-40 px-6">
        <div class="w-full max-w-2xl space-y-16">
            
            <!-- Hero Problem Section -->
            <section id="hero-section" class="space-y-8">
                <div class="flex items-center gap-4">
                    <span id="case-id" class="text-[10px] font-black text-yellow-500/50 uppercase tracking-widest">Archive #01</span>
                    <div class="h-px flex-grow bg-zinc-900"></div>
                </div>
                <h2 id="problem-text" class="text-3xl md:text-5xl font-serif font-black leading-[1.15] text-white selection:bg-yellow-500/40">
                    "한 남자가 음식점에서 바다거북 수프를 주문해 한 입 먹고 자살했다. 왜일까?"
                </h2>
            </section>

            <!-- Dialogue Stream -->
            <section id="chat-box" class="space-y-12 pb-20">
                <!-- Dialogue flows naturally without heavy boxes -->
            </section>
        </div>
    </main>

    <!-- Floating Command Console -->
    <div class="fixed bottom-10 inset-x-0 flex justify-center px-6 z-50">
        <div class="w-full max-w-2xl floating-input-container rounded-[2rem] p-2 flex items-center transition-all focus-within:ring-1 focus-within:ring-white/10">
            <input type="text" id="user-input" placeholder="사건의 내막을 질문하세요..." 
                class="flex-grow bg-transparent border-none outline-none px-6 py-4 text-base font-medium placeholder:text-zinc-700">
            <button id="send-btn" class="w-12 h-12 bg-white rounded-full flex items-center justify-center text-zinc-950 hover:bg-zinc-200 transition-all active:scale-90 shadow-lg">
                <svg id="send-icon" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 001.169 1.409l5-1.429A1 1 0 009 15.571V11a1 1 0 112 0v4.571a1 1 0 00.725.962l5 1.428a1 1 0 001.17-1.408l-7-14z" /></svg>
                <div id="typing-indicator" class="hidden w-4 h-4 border-2 border-zinc-900/20 border-t-zinc-900 rounded-full animate-spin"></div>
            </button>
        </div>
    </div>

    <script type="module">
        import * as webllm from "https://esm.run/@mlc-ai/web-llm";

        const cases = [
            { id: 1, problem: "한 남자가 음식점에서 바다거북 수프를 주문해 한 입 먹고 자살했다. 왜일까?", truth: "남자는 과거 아내와 조난당해 인육을 먹고 살아남았으나, 진짜 수프 맛이 다른 것을 보고 진실을 깨달아 자살함." },
            { id: 2, problem: "사막에 한 남자가 알몸으로 죽어 있다. 손에는 부러진 성냥개비가 들려 있다. 왜일까?", truth: "열기구 무게를 줄이기 위해 옷을 다 벗었으나 부족했고, 성냥개비를 뽑아 떨어진 사람이 이 남자였음." },
            { id: 3, problem: "밤늦게 TV를 보던 여자가 TV를 끄고 잤다. 다음날 뉴스를 보고 절망했다. 왜일까?", truth: "그녀는 등대지기였고, 그녀가 끈 것은 TV가 아니라 등대 불빛이었음. 이로 인해 대형 난파 사고가 발생함." }
        ];

        let currentCase = cases[0];
        let engine;
        let chatHistory = [];

        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const sendIcon = document.getElementById('send-icon');
        const typingIndicator = document.getElementById('typing-indicator');
        const aiLoading = document.getElementById('ai-loading');
        const loadingStatus = document.getElementById('loading-status');

        async function initAI() {
            try {
                engine = await webllm.CreateWebWorkerEngine(
                    new Worker(URL.createObjectURL(new Blob([`importScripts("https://esm.run/@mlc-ai/web-llm/dist/worker.js");`], { type: "text/javascript" }))),
                    "gemma-2b-it-q4f16_1-MLC",
                    {
                        initProgressCallback: (report) => {
                            loadingStatus.innerText = `Learning Logic... ${Math.floor(report.progress * 100)}%`;
                            if (report.progress >= 1) {
                                setTimeout(() => aiLoading.style.opacity = '0', 500);
                                setTimeout(() => aiLoading.style.display = 'none', 1500);
                            }
                        }
                    }
                );
                resetGame();
            } catch (err) {
                loadingStatus.innerText = "Check Browser/GPU Compatibility";
                console.error(err);
            }
        }

        window.randomCase = function() {
            currentCase = cases.filter(c => c.id !== currentCase.id)[Math.floor(Math.random() * (cases.length - 1))];
            document.getElementById('case-id').innerText = `Archive #0${currentCase.id}`;
            document.getElementById('problem-text').innerText = currentCase.problem;
            resetGame();
        };

        function resetGame() {
            chatBox.innerHTML = `
                <div class="message-fade space-y-3">
                    <p class="text-[10px] font-bold text-yellow-500/60 uppercase tracking-widest">AI Master</p>
                    <p class="text-zinc-400 text-lg leading-relaxed font-medium">조사를 시작합니다. 질문을 던져주십시오. (예/아니오 답변 가능)</p>
                </div>
            `;
            chatHistory = [{
                role: "system",
                content: `너는 바다거북 스프 게임 마스터야. 상황: ${currentCase.problem} / 진실: ${currentCase.truth}. 규칙: 1. 질문에 오직 '예', '아니오', '관련 없습니다' 중 하나로만 답하라. 2. 핵심 진실에 도달하면 정답임을 알리고 전체 스토리를 설명하라. 3. 한국어로만 답하라.`
            }];
        }

        function appendMessage(role, text) {
            const div = document.createElement('div');
            div.className = `message-fade space-y-3 ${role === 'user' ? 'text-right' : 'text-left'}`;
            
            const content = role === 'user' 
                ? `<p class="text-[10px] font-bold text-zinc-600 uppercase tracking-widest">Investigator</p>
                   <p class="text-white text-xl font-semibold leading-snug">${text}</p>`
                : `<p class="text-[10px] font-bold text-yellow-500/60 uppercase tracking-widest">AI Master</p>
                   <p class="text-zinc-400 text-lg leading-relaxed font-medium italic font-serif">${text}</p>`;
            
            div.innerHTML = content;
            chatBox.appendChild(div);
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }

        async function handleSend() {
            const val = userInput.value.trim();
            if (!val || !engine) return;

            appendMessage('user', val);
            userInput.value = '';
            sendIcon.classList.add('hidden');
            typingIndicator.classList.remove('hidden');
            
            chatHistory.push({ role: "user", content: val });

            try {
                const chunks = await engine.chat.completions.create({ messages: chatHistory, temperature: 0.1 });
                const reply = chunks.choices[0].message.content;
                chatHistory.push({ role: "assistant", content: reply });
                appendMessage('ai', reply);
            } catch (err) {
                appendMessage('ai', "Link Error: " + err.message);
            } finally {
                sendIcon.classList.remove('hidden');
                typingIndicator.classList.add('hidden');
            }
        }

        sendBtn.addEventListener('click', handleSend);
        userInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleSend(); });

        initAI();
    </script>
</body>
</html>
