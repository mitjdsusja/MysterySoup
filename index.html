<!DOCTYPE html>
<html lang="ko" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mystery Soup AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Noto+Serif+KR:wght@400;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Plus Jakarta Sans', 'sans-serif'],
                        serif: ['Noto Serif KR', 'serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #000; color: #fff; font-family: 'Plus Jakarta Sans', sans-serif; }
        .main-card { background: rgba(20, 20, 20, 0.6); backdrop-filter: blur(30px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .input-glow:focus { box-shadow: 0 0 30px rgba(234, 179, 8, 0.1); border-color: rgba(234, 179, 8, 0.3); }
        .fade-in { animation: fadeIn 0.8s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="overflow-hidden flex items-center justify-center min-h-screen">

    <!-- Ambient Background -->
    <div class="fixed inset-0 bg-gradient-to-tr from-black via-[#0a0a0a] to-[#111] pointer-events-none"></div>
    <div class="fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-yellow-600/5 blur-[150px] rounded-full pointer-events-none"></div>

    <!-- AI Initialization Layer -->
    <div id="ai-loading" class="fixed inset-0 z-50 bg-black flex flex-col items-center justify-center transition-all duration-1000">
        <div class="w-12 h-12 border-2 border-yellow-600/20 border-t-yellow-600 rounded-full animate-spin mb-6"></div>
        <p id="loading-status" class="text-[10px] uppercase tracking-[0.4em] text-yellow-600/60 font-bold">Initializing AI Master...</p>
    </div>

    <!-- Main Content -->
    <main class="relative z-10 w-full max-w-2xl px-6 flex flex-col h-[90vh]">
        
        <!-- Header: Minimal -->
        <header class="flex justify-between items-center mb-8">
            <div class="flex items-center gap-2">
                <div class="w-2 h-2 bg-yellow-600 rounded-full animate-pulse"></div>
                <span class="text-[10px] font-black uppercase tracking-[0.3em] text-white/40">Mystery Soup AI</span>
            </div>
            <button onclick="randomCase()" class="group flex items-center gap-2 text-[10px] font-black uppercase tracking-[0.2em] text-white/40 hover:text-yellow-600 transition-colors">
                <span>Random Case</span>
                <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3 group-hover:rotate-180 transition-transform duration-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.001 0 01-15.357-2m15.357 2H15" /></svg>
            </button>
        </header>

        <!-- Problem Section -->
        <div class="flex-shrink-0 mb-10">
            <h2 id="case-title" class="text-xs font-bold text-yellow-600 uppercase tracking-widest mb-4 opacity-60">Case #01</h2>
            <p id="problem-text" class="text-2xl md:text-3xl font-serif font-bold leading-snug text-white/90 italic fade-in">
                "한 남자가 음식점에서 바다거북 수프를 주문해 한 입 먹었다. 그리고는 주방장을 불러 진짜 바다거북 수프인지 확인한 뒤 집으로 돌아가 자살했다. 왜일까?"
            </p>
        </div>

        <!-- Chat History -->
        <div id="chat-box" class="flex-grow overflow-y-auto space-y-8 mb-8 pr-2">
            <!-- Messages appear here -->
        </div>

        <!-- Input Area -->
        <div class="mt-auto relative">
            <input type="text" id="user-input" placeholder="사건에 대해 질문하세요..." 
                class="w-full bg-white/5 border border-white/10 rounded-2xl px-8 py-6 outline-none transition-all input-glow text-lg font-medium placeholder:text-white/10">
            <div class="absolute right-6 top-1/2 -translate-y-1/2 flex items-center gap-4">
                <span id="typing-indicator" class="hidden text-[10px] font-bold text-yellow-600 uppercase tracking-widest animate-pulse">AI Thinking</span>
                <button id="send-btn" class="p-2 hover:text-yellow-600 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M14 5l7 7m0 0l-7 7m7-7H3" /></svg>
                </button>
            </div>
        </div>

        <!-- Footer Info -->
        <footer class="mt-6 flex justify-between items-center text-[8px] font-bold uppercase tracking-[0.3em] text-white/20">
            <span>Powered by Local WebGPU</span>
            <span>All Data Remains Private</span>
        </footer>
    </main>

    <script type="module">
        import * as webllm from "https://esm.run/@mlc-ai/web-llm";

        const cases = [
            {
                id: 1,
                title: "Sea Turtle Soup",
                problem: "한 남자가 음식점에서 바다거북 수프를 주문해 한 입 먹었다. 그리고는 주방장을 불러 진짜 바다거북 수프인지 확인한 뒤 집으로 돌아가 자살했다. 왜일까?",
                truth: "남자는 과거에 아내와 조난당했다. 동료가 준 '바다거북 수프'를 먹고 살아남았으나, 나중에 식당에서 진짜 수프를 먹어보니 맛이 달랐다. 결국 조난 때 먹은 것이 아내의 인육이었음을 깨닫고 자살한 것이다."
            },
            {
                id: 2,
                title: "The Dead Man in the Desert",
                problem: "사막 한가운데에 한 남자가 알몸으로 죽어 있다. 그의 손에는 부러진 성냥개비 하나가 들려 있다. 어떻게 된 일일까?",
                truth: "남자는 친구들과 열기구를 타고 사막을 건너고 있었다. 열기구가 고도를 잃자 무게를 줄이기 위해 옷을 다 벗어 던졌으나 부족했다. 결국 성냥개비를 뽑아 가장 짧은 것을 뽑은 사람이 뛰어내리기로 했고, 남자가 당첨되어 뛰어내린 것이다."
            },
            {
                id: 3,
                title: "Late Night TV",
                problem: "한 여자가 밤늦게 TV를 보고 있다가 갑자기 TV를 끄고 잠을 자러 갔다. 다음 날 아침, 그녀는 뉴스 기사를 보고 절망했다. 왜일까?",
                truth: "그녀는 등대지기였다. 그녀가 끈 것은 TV가 아니라 등대의 불빛이었다. 그날 밤 배 한 척이 바위에 부딪혀 난파되었고 많은 사람이 죽었다는 뉴스를 보고 절망한 것이다."
            }
        ];

        let currentCase = cases[0];
        let engine;
        let chatHistory = [];

        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const loadingStatus = document.getElementById('loading-status');
        const aiLoading = document.getElementById('ai-loading');
        const typingIndicator = document.getElementById('typing-indicator');

        async function initAI() {
            try {
                engine = await webllm.CreateWebWorkerEngine(
                    new Worker(new URL("https://esm.run/@mlc-ai/web-llm/dist/worker.js", import.meta.url)),
                    "gemma-2b-it-q4f16_1-MLC",
                    {
                        initProgressCallback: (report) => {
                            loadingStatus.innerText = `Loading Knowledge... ${Math.floor(report.progress * 100)}%`;
                            if (report.progress >= 1) {
                                setTimeout(() => aiLoading.style.transform = 'translateY(-100%)', 500);
                            }
                        }
                    }
                );
                resetGame();
            } catch (err) {
                loadingStatus.innerText = "Compatibility Error";
                console.error(err);
            }
        }

        window.randomCase = function() {
            const otherCases = cases.filter(c => c.id !== currentCase.id);
            currentCase = otherCases[Math.floor(Math.random() * otherCases.length)];
            
            // UI Update
            const p = document.getElementById('problem-text');
            p.style.opacity = '0';
            setTimeout(() => {
                document.getElementById('case-title').innerText = `Case #${String(currentCase.id).padStart(2, '0')}`;
                p.innerText = currentCase.problem;
                p.style.opacity = '1';
                resetGame();
            }, 400);
        };

        function resetGame() {
            chatBox.innerHTML = '';
            chatHistory = [{
                role: "system",
                content: `너는 바다거북 스프 게임 마스터야. 상황: ${currentCase.problem} / 진실: ${currentCase.truth}. 규칙: 1. 사용자의 질문에 오직 '예', '아니오', '관련 없습니다' 중 하나로만 답하라. 2. 핵심 진실에 도달하면 정답임을 알리고 전체 스토리를 설명하라. 3. 한국어로만 답하라.`
            }];
        }

        function appendMessage(role, text) {
            const div = document.createElement('div');
            div.className = `fade-in ${role === 'user' ? 'text-right' : 'text-left'}`;
            div.innerHTML = `
                <p class="text-[8px] font-black uppercase tracking-[0.3em] mb-2 ${role === 'user' ? 'text-white/20' : 'text-yellow-600/60'}">${role === 'user' ? 'Investigator' : 'AI Master'}</p>
                <p class="text-lg ${role === 'user' ? 'text-white font-medium' : 'text-white/60 font-serif italic'}">${text}</p>
            `;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        async function handleSend() {
            const val = userInput.value.trim();
            if (!val || !engine) return;

            appendMessage('user', val);
            userInput.value = '';
            typingIndicator.classList.remove('hidden');
            
            chatHistory.push({ role: "user", content: val });

            try {
                const chunks = await engine.chat.completions.create({
                    messages: chatHistory,
                    temperature: 0.1
                });
                const reply = chunks.choices[0].message.content;
                chatHistory.push({ role: "assistant", content: reply });
                appendMessage('ai', reply);
            } catch (err) {
                appendMessage('ai', "Error: " + err.message);
            } finally {
                typingIndicator.classList.add('hidden');
            }
        }

        sendBtn.addEventListener('click', handleSend);
        userInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleSend(); });

        initAI();
    </script>
</body>
</html>
